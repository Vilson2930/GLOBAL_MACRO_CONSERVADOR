name: Run Macro Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance fredapi openpyxl requests

      - name: Run Macro Engine
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python main.py | tee report.txt

      - name: Send Email Report
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python - << 'EOF'
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          with open("report.txt", "r", encoding="utf-8") as f:
              report = f.read()

          html = f"""
          <html>
          <body style="font-family: Arial; background:#0f1117; color:#e6edf3; padding:20px;">
          <div style="background:#161b22; padding:20px; border-radius:12px;">
          <h1 style="color:#58a6ff;">GLOBAL MACRO ENGINE</h1>
          <p><b>Relatório automático de alocação macro</b></p>
          <pre style="background:#0d1117; padding:15px; border-radius:8px; overflow-x:auto; color:#c9d1d9;">
          {report}
          </pre>
          <p style="color:#8b949e; font-size:12px;">Gerado automaticamente via GitHub Actions</p>
          </div>
          </body>
          </html>
          """

          msg = MIMEMultipart("alternative")
          msg["Subject"] = "GLOBAL MACRO ENGINE - Relatório"
          msg["From"] = os.environ["SMTP_USER"]
          msg["To"] = os.environ["EMAIL_TO"]
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(os.environ["SMTP_USER"], os.environ["SMTP_PASSWORD"])
              server.send_message(msg)

          print("EMAIL ENVIADO")
          EOF
